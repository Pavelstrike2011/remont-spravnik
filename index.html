            function parseMaterialsLinksForShare(html) {
                var sections = [];
                if (!html || html.indexOf('material-category-card') < 0 || typeof DOMParser === 'undefined') return sections;
                var doc = new DOMParser().parseFromString('<div>' + html + '</div>', 'text/html');
                var root = doc.body.firstElementChild;
                if (!root) return sections;
                root.querySelectorAll('.material-category-card').forEach(function (card) {
                    var titleEl = card.querySelector('.material-category-title');
                    var titleText = titleEl ? titleEl.textContent.replace(/\s+/g, ' ').trim() : '';
                    var items = [];
                    var details = card.querySelector('.material-category-details');
                    if (details) {
                        details.querySelectorAll('a.material-detail-link').forEach(function (a) {
                            var label = a.textContent.replace(/\s+/g, ' ').trim();
                            var href = a.getAttribute('href') || '';
                            if (label) items.push({ label: label, href: href });
                        });
                        details.querySelectorAll(':scope > span').forEach(function (sp) {
                            var label = sp.textContent.replace(/\s+/g, ' ').trim();
                            if (label) items.push({ label: label, href: '' });
                        });
                        if (!items.length) {
                            var plain = details.textContent.replace(/\s+/g, ' ').trim();
                            if (plain) items.push({ label: plain, href: '' });
                        }
                    }
                    if (titleText || items.length) sections.push({ title: titleText, items: items });
                });
                return sections;
            }

            function buildFinishMaterialsShareText() {
                var html = '';
                if (estimateMaterialsBody && estimateMaterialsBody.innerHTML &&
                    estimateMaterialsBody.innerHTML.indexOf('material-category-card') >= 0) {
                    html = estimateMaterialsBody.innerHTML;
                } else if (typeof CmetShared !== 'undefined' && CmetShared.buildMaterialsListHtml) {
                    html = CmetShared.buildMaterialsListHtml();
                }
                var sections = parseMaterialsLinksForShare(html);
                if (!sections.length || !sections.some(function (s) { return s.items && s.items.length; })) return '';

                var addr = getEstimateExportAddress();
                var lines = [addr ? ('Финишные материалы — ' + addr) : 'Финишные материалы', ''];
                sections.forEach(function (sec) {
                    if (sec.title) lines.push(sec.title);
                    (sec.items || []).forEach(function (item) {
                        if (item.href) lines.push('• ' + item.label + '\n' + item.href);
                        else if (item.label) lines.push('• ' + item.label);
                    });
                    lines.push('');
                });
                return lines.join('\n').trim();
            }

            function buildEstimateShareText() {
                if (!estimateContent) return '';
                var lines = [];
                var titleEl = estimateContent.querySelector('.estimate-doc-title');
                lines.push((titleEl && titleEl.textContent.trim()) ? titleEl.textContent.trim() : 'Смета на ремонт');
                lines.push('');
                var tbody = estimateContent.querySelector('table.estimate-table tbody');
                if (!tbody) return lines.join('\n');
                tbody.querySelectorAll(':scope > tr').forEach(function (tr) {
                    if (tr.classList.contains('category')) {
                        lines.push('■ ' + tr.textContent.replace(/\s+/g, ' ').trim());
                        lines.push('');
                    } else if (tr.classList.contains('subcategory')) {
                        lines.push('  • ' + tr.textContent.replace(/\s+/g, ' ').trim());
                    } else if (tr.classList.contains('work-item')) {
                        var td = tr.querySelectorAll('td');
                        if (td.length >= 6) {
                            var name = td[1].innerText.replace(/\s+/g, ' ').trim();
                            var rate = td[2].innerText.replace(/\s+/g, ' ').trim();
                            var qty = td[3].innerText.replace(/\s+/g, ' ').trim();
                            var unit = td[4].innerText.replace(/\s+/g, ' ').trim();
                            var cost = td[5].innerText.replace(/\s+/g, ' ').trim();
                            lines.push('    — ' + name + ' | ' + rate + ' ₽ × ' + qty + ' ' + unit + ' → ' + cost + ' ₽');
                        }
                    }
                });
                if (typeof CmetShared !== 'undefined' && CmetShared.getEstimateRatePercent) {
                    var ratePct = CmetShared.getEstimateRatePercent();
                    if (ratePct) {
                        var pctSign = ratePct > 0 ? '+' : '';
                        lines.push('Корректировка расценок: ' + pctSign + ratePct + '%');
                    }
                }
                var sumEl = estimateContent.querySelector('.estimate-total-sum');
                lines.push('');
                if (sumEl) lines.push('Итого: ' + sumEl.textContent.replace(/\s+/g, ' ').trim());
                return lines.join('\n');
            }

            function openMaxShareUrl(text) {
                var url = 'https://max.ru/:share?text=' + encodeURIComponent(text);
                var opened = window.open(url, '_blank', 'noopener,noreferrer');
                if (!opened) window.location.href = url;
            }

            function openMaxEstimateShare() {
                var text = buildEstimateShareText();
                if (!text || text.length < 20) {
                    alert('Смета пуста — сначала сформируйте смету на работы');
                    return;
                }
                openMaxShareUrl(text);
            }

            function injectEstimateMaxShareBtn() {
                if (!estimateContent) return;
                estimateContent.querySelectorAll('.estimate-max-share').forEach(function (el) { el.remove(); });
                var table = estimateContent.querySelector('table.estimate-table');
                if (!table) return;
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'btn-action estimate-max-share';
                btn.textContent = 'Отправить смету в Max';
                btn.addEventListener('click', openMaxEstimateShare);
                table.insertAdjacentElement('afterend', btn);
            }

            function openMaxMaterialsShare() {
                if (!CmetShared || !CmetShared.buildMaterialsListHtml) {
                    alert('Модуль материалов не загружен');
                    return;
                }
                var ctx = syncEstimateEngineContext();
                if (!ctx) {
                    alert('Отметьте хотя бы один раздел материалов');
                    return;
                }
                var text = buildFinishMaterialsShareText();
                if (!text) {
                    alert('Нет выбранных материалов для отправки');
                    return;
                }
                openMaxShareUrl(text);
            }

            function onEstActionSecondaryClick() {
                if (estimateSubView === EST_SUB_SCHEDULE) {
                    openRoughStep();
                } else if (estimateSubView === EST_SUB_MATERIALS) {
                    openMaxMaterialsShare();
                } else {
                    openScheduleStep();
                }
            }

            function renderEstimate() {
                if (typeof window.CmetShared === 'undefined') {
                    alert('Модуль расчёта сметы не загружен');
                    return false;
                }
                if (!lastCalc) {
                    alert('Сначала выполните расчёт площадей');
                    return false;
                }
                var keys = collectCheckedSubtopicKeys();
                if (!keys.length) {
                    alert('Отметьте хотя бы один раздел материалов');
                    return false;
                }

                try {
                    var ctx = syncEstimateEngineContext();
                    if (!ctx) return false;
                    var engineCalc = ctx.engineCalc;

                    var meta = buildEstimateMeta(engineCalc);
                    var ed = CmetShared.generateDetailedEstimateData(apartmentTypeSel.value, meta);
                    var html = CmetShared.buildEstimateTableHtml(ed);
                    estimateContent.innerHTML = html;
                    lastEstimateData = ed;
                    lastEngineCalcForPanels = engineCalc;
                    lastEngineChForPanels = meta.ch;
                    if (estimateActions) estimateActions.hidden = false;

                    var table = estimateContent.querySelector('table.estimate-table');
                    if (table && CmetShared.refreshEstimateTotalsForTable) {
                        CmetShared.refreshEstimateTotalsForTable(table);
                    }
                    injectEstimateMaxShareBtn();
                    showEstimateSubView(EST_SUB_ESTIMATE, true);
                } catch (err) {
                    console.error(err);
                    alert('Ошибка формирования сметы: ' + (err && err.message ? err.message : String(err)));
                    return false;
                }
                return true;
            }

            function goToEstimate() {
                if (materialsDetailOpen) closeCategoryDetail();
                if (!renderEstimate()) return;
                showScreen(SCREEN_ESTIMATE);
            }

            var historyApplying = false;

            function buildAppHistoryState() {
                var overlay = null;
                if (qtyDialog && !qtyDialog.hidden) overlay = 'qty';
                else if (estPanelOverlay && !estPanelOverlay.hidden) overlay = 'panel';
                return {
                    app: 'cmet',
                    screen: currentScreen,
                    category: materialsDetailOpen && activeCategoryId ? activeCategoryId : null,
                    estView: estimateSubView,
                    overlay: overlay
                };
            }

            /** Разные hash-URL нужны для iOS Safari: одинаковый URL не всегда создаёт шаг истории. */
            function buildAppHistoryUrl(state) {
                var parts = ['s=' + (state && state.screen != null ? state.screen : 0)];
                if (state && state.category) parts.push('c=' + encodeURIComponent(state.category));
                if (state && state.estView && state.estView !== EST_SUB_ESTIMATE) parts.push('v=' + state.estView);
                if (state && state.overlay) parts.push('o=' + state.overlay);
                return location.pathname + location.search + '#' + parts.join('&');
            }

            function pushAppHistory() {
                if (historyApplying) return;
                try {
                    var state = buildAppHistoryState();
                    history.pushState(state, '', buildAppHistoryUrl(state));
                } catch (err) { /* ignore */ }
            }

            function closeQtyDialogSilent() {
                if (!qtyDialog || qtyDialog.hidden) return;
                unbindQtyDialogViewport();
                qtyDialog.hidden = true;
                qtyEditContext = null;
            }

            function closeEstPanelSilent() {
                if (estPanelOverlay) estPanelOverlay.hidden = true;
                if (estPanelBody) estPanelBody.innerHTML = '';
            }

            function applyAppHistoryState(state) {
                if (!state || state.app !== 'cmet') state = { app: 'cmet', screen: SCREEN_INPUT, category: null, estView: EST_SUB_ESTIMATE, overlay: null };

                closeQtyDialogSilent();
                closeEstPanelSilent();

                showScreenInternal(state.screen);

                if (state.screen === SCREEN_MATERIALS && state.category) {
                    var cat = getCategoryById(state.category);
                    if (cat) {
                        activeCategoryId = state.category;
                        materialsDetailOpen = true;
                        materialsHub.hidden = true;
                        materialsDetail.hidden = false;
                        materialsDetailTitle.textContent = cat.title;
                        materialsDetailHint.textContent = getCategoryHint(cat);
                        renderMaterialOptions();
                    }
                }

                if (state.screen === SCREEN_ESTIMATE) {
                    showEstimateSubView(state.estView || EST_SUB_ESTIMATE, true);
                }
                updateStepper();
            }

            function onAppPopState(e) {
                historyApplying = true;
                try {
                    applyAppHistoryState(e.state);
                } finally {
                    historyApplying = false;
                }
            }

            function initPhoneBackNavigation() {
                var state = buildAppHistoryState();
                history.replaceState(state, '', buildAppHistoryUrl(state));
                window.addEventListener('popstate', onAppPopState);
            }

            function showScreenInternal(index) {
                currentScreen = index;
                screenInput.hidden = index !== SCREEN_INPUT;
                screenResults.hidden = index !== SCREEN_RESULTS;
                screenMaterials.hidden = index !== SCREEN_MATERIALS;
                screenEstimate.hidden = index !== SCREEN_ESTIMATE;
                if (index !== SCREEN_ESTIMATE && estimateSubView !== EST_SUB_ESTIMATE) {
                    showEstimateSubView(EST_SUB_ESTIMATE, true);
                }
                if (index === SCREEN_MATERIALS) {
                    showMaterialsHub();
                    renderCategoryHub();
                }
                updateStepper();
            }

            function showScreen(index) {
                showScreenInternal(index);
                if (!historyApplying) pushAppHistory();
            }

            function goToMaterials() {
                if (!hasResults) return;
                showScreen(SCREEN_MATERIALS);
            }

            function navBack() {
                if (canAppGoBack()) history.back();
            }

            function canAppGoBack() {
                if (qtyDialog && !qtyDialog.hidden) return true;
                if (estPanelOverlay && !estPanelOverlay.hidden) return true;
                if (currentScreen === SCREEN_MATERIALS && materialsDetailOpen) return true;
                if (currentScreen === SCREEN_ESTIMATE && estimateSubView !== EST_SUB_ESTIMATE) return true;
                if (currentScreen === SCREEN_ESTIMATE) return true;
                if (currentScreen > SCREEN_INPUT) return true;
                return false;
            }

            var STEP_PARAMS = 0;
            var STEP_AREAS = 1;
            var STEP_WORKS = 2;
            var STEP_ESTIMATE = 3;
            var STEP_SCHEDULE = 4;
            var STEP_ROUGH = 5;
            var STEP_FINISH = 6;

            function getCurrentStepIndex() {
                if (currentScreen === SCREEN_ESTIMATE) {
                    if (estimateSubView === EST_SUB_SCHEDULE) return STEP_SCHEDULE;
                    if (estimateSubView === EST_SUB_MATERIALS) return STEP_FINISH;
                    return STEP_ESTIMATE;
                }
                if (currentScreen === SCREEN_MATERIALS) return STEP_WORKS;
                if (currentScreen === SCREEN_RESULTS) return STEP_AREAS;
                return STEP_PARAMS;
            }

            function canGoToStep(step) {
                if (step === STEP_PARAMS) return true;
                if (!hasResults) return false;
                if (step <= STEP_WORKS) return true;
                if (!collectCheckedSubtopicKeys().length) return false;
                return true;
            }

            function updateStepper() {
                if (!pageStepper) return;
                var current = getCurrentStepIndex();
                pageStepper.querySelectorAll('.stepper__item').forEach(function (btn) {
                    var step = parseInt(btn.getAttribute('data-step'), 10);
                    btn.classList.toggle('is-active', step === current);
                    btn.classList.toggle('is-done', step < current);
                    btn.disabled = !canGoToStep(step);
                });
                pageStepper.querySelectorAll('.stepper__dash').forEach(function (dash) {
                    var after = parseInt(dash.getAttribute('data-after'), 10);
                    dash.classList.toggle('is-done', after < current);
                });
            }

            function formatLocalDateIso(d) {
                var y = d.getFullYear();
                var m = String(d.getMonth() + 1).padStart(2, '0');
                var day = String(d.getDate()).padStart(2, '0');
                return y + '-' + m + '-' + day;
            }

            function openMaxScheduleShare() {
                if (!lastScheduleShareData || !CmetShared.buildScheduleClipboardTimelineText) {
                    alert('График работ не сформирован');
                    return;
                }
                var text = CmetShared.buildScheduleClipboardTimelineText(
                    lastScheduleShareData,
                    getEstimateExportAddress(),
                    { uppercaseStages: true }
                );
                if (!text) {
                    alert('Нет этапов для отправки');
                    return;
                }
                openMaxShareUrl(text);
            }

            function injectScheduleMaxShareBtn() {
                if (!estimateScheduleBody) return;
                estimateScheduleBody.querySelectorAll('.schedule-max-share').forEach(function (el) { el.remove(); });
                if (!estimateScheduleBody.querySelector('.v2-timeline')) return;
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'btn-action schedule-max-share';
                btn.textContent = 'Отправить график работ в Max';
                btn.addEventListener('click', openMaxScheduleShare);
                estimateScheduleBody.appendChild(btn);
            }

            function openScheduleStep() {
                var ctx = syncEstimateEngineContext();
                if (!ctx) {
                    alert('Отметьте хотя бы один раздел материалов');
                    return false;
                }
                if (!CmetShared.buildScheduleTimelinePanelHtml || !CmetShared.buildScheduleData || !CmetShared.applyScheduleStartDate) {
                    alert('Модуль этапов не загружен');
                    return false;
                }
                if (currentScreen !== SCREEN_ESTIMATE) {
                    if (!renderEstimate()) return false;
                    showScreen(SCREEN_ESTIMATE);
                }
                var todayIso = formatLocalDateIso(new Date());
                var scheduleData = CmetShared.buildScheduleData(ctx.engineCalc);
                lastScheduleShareData = CmetShared.applyScheduleStartDate(scheduleData, todayIso);
                if (estimateScheduleBody) {
                    estimateScheduleBody.innerHTML = CmetShared.buildScheduleTimelinePanelHtml(ctx.engineCalc, todayIso);
                    injectScheduleMaxShareBtn();
                }
                showEstimateSubView(EST_SUB_SCHEDULE);
                if (estimateScheduleWrap) {
                    estimateScheduleWrap.scrollIntoView({ block: 'start', behavior: 'smooth' });
                }
                return true;
            }

            function openRoughStep() {
                if (!lastCalc) {
                    alert('Сначала выполните расчёт площадей');
                    return false;
                }
                if (!CmetShared.getBasketUrl) {
                    alert('Модуль корзины не загружен');
                    return false;
                }
                var ctx = syncEstimateEngineContext();
                if (!ctx) {
                    alert('Отметьте хотя бы один раздел материалов');
                    return false;
                }
                if (currentScreen !== SCREEN_ESTIMATE) {
                    if (!renderEstimate()) return false;
                    showScreen(SCREEN_ESTIMATE);
                } else if (estimateSubView !== EST_SUB_ESTIMATE) {
                    showEstimateSubView(EST_SUB_ESTIMATE);
                }
                openLemanaBasketUrl(CmetShared.getBasketUrl(ctx.engineCalc, ctx.ch));
                updateStepper();
                return true;
            }

            function openFinishStep() {
                var ctx = syncEstimateEngineContext();
                if (!ctx) {
                    alert('Отметьте хотя бы один раздел материалов');
                    return false;
                }
                if (!CmetShared.buildMaterialsListHtml) {
                    alert('Модуль материалов не загружен');
                    return false;
                }
                if (currentScreen !== SCREEN_ESTIMATE) {
                    if (!renderEstimate()) return false;
                    showScreen(SCREEN_ESTIMATE);
                }
                var materialsHtml = CmetShared.buildMaterialsListHtml();
                if (!materialsHtml || materialsHtml.indexOf('material-category-card') < 0) {
                    materialsHtml = '<p class="estimate-materials-empty">Нет выбранных материалов</p>';
                }
                if (estimateMaterialsBody) {
                    estimateMaterialsBody.innerHTML = materialsHtml;
                }
                showEstimateSubView(EST_SUB_MATERIALS);
                if (estimateMaterialsWrap) {
                    estimateMaterialsWrap.scrollIntoView({ block: 'start', behavior: 'smooth' });
                }
                return true;
            }

            function goToStep(step) {
                if (!canGoToStep(step)) return;
                if (step === getCurrentStepIndex()) return;
                if (step === STEP_PARAMS) {
                    showScreen(SCREEN_INPUT);
                    return;
                }
                if (step === STEP_AREAS) {
                    showScreen(SCREEN_RESULTS);
                    return;
                }
                if (step === STEP_WORKS) {
                    showScreen(SCREEN_MATERIALS);
                    return;
                }
                if (step === STEP_ESTIMATE) {
                    if (currentScreen === SCREEN_ESTIMATE && estimateSubView !== EST_SUB_ESTIMATE) {
                        showEstimateSubView(EST_SUB_ESTIMATE);
                        return;
                    }
                    goToEstimate();
                    return;
                }
                if (step === STEP_SCHEDULE) {
                    openScheduleStep();
                    return;
                }
                if (step === STEP_ROUGH) {
                    openRoughStep();
                    return;
                }
                if (step === STEP_FINISH) {
                    openFinishStep();
                }
            }

            function navForward() {
                if (currentScreen === SCREEN_INPUT) {
                    if (hasResults) showScreen(SCREEN_RESULTS);
                    return;
                }
                if (currentScreen === SCREEN_RESULTS) {
                    if (hasResults) showScreen(SCREEN_MATERIALS);
                    return;
                }
                if (currentScreen === SCREEN_MATERIALS) {
                    if (materialsDetailOpen) return;
                    goToEstimate();
                    return;
                }
            }

            function isSwipeNavigationBlocked() {
                if (qtyDialog && !qtyDialog.hidden) return true;
                if (estPanelOverlay && !estPanelOverlay.hidden) return true;
                return false;
            }

            function initSwipeNavigation() {
                var pageMain = document.querySelector('main.page');
                if (!pageMain) return;
                var SWIPE_MIN_PX = 72;
                var startX = 0;
                var startY = 0;
                var tracking = false;

                pageMain.addEventListener('touchstart', function (e) {
                    if (isSwipeNavigationBlocked() || !e.touches || e.touches.length !== 1) return;
                    var t = e.touches[0];
                    startX = t.clientX;
                    startY = t.clientY;
                    tracking = true;
                }, { passive: true });

                pageMain.addEventListener('touchend', function (e) {
                    if (!tracking || isSwipeNavigationBlocked() || !e.changedTouches || !e.changedTouches.length) return;
                    tracking = false;
                    var t = e.changedTouches[0];
                    var dx = t.clientX - startX;
                    var dy = t.clientY - startY;
                    if (Math.abs(dx) < SWIPE_MIN_PX) return;
                    if (Math.abs(dx) <= Math.abs(dy)) return;
                    if (dx < 0) navForward();
                    else navBack();
                }, { passive: true });

                pageMain.addEventListener('touchcancel', function () {
                    tracking = false;
                }, { passive: true });
            }

            function openEstPanel(title, bodyHtml) {
                if (!estPanelOverlay) return;
                if (estPanelTitle) estPanelTitle.textContent = title;
                if (estPanelBody) estPanelBody.innerHTML = bodyHtml || '';
                estPanelOverlay.hidden = false;
                if (!historyApplying) pushAppHistory();
                updateStepper();
            }

            function closeEstPanel() {
                if (estPanelOverlay && !estPanelOverlay.hidden && history.state && history.state.overlay === 'panel' && !historyApplying) {
                    history.back();
                    return;
                }
                closeEstPanelSilent();
            }

            function ensurePanelsContext() {
                if (!lastEngineCalcForPanels || !lastEstimateData) {
                    alert('Сначала откройте смету на работы');
                    return false;
                }
                return true;
            }

            function getEstimateExportAddress() {
                return (lastEstimateData && lastEstimateData.address) ? String(lastEstimateData.address).trim() : '';
            }

            if (estBtnExport) {
                estBtnExport.addEventListener('click', function () {
                    if (estimateSubView === EST_SUB_SCHEDULE) {
                        var ctxSched = syncEstimateEngineContext();
                        if (!ctxSched) return;
                        if (!CmetShared.exportScheduleToExcel) {
                            alert('Экспорт этапов недоступен');
                            return;
                        }
                        if (!CmetShared.exportScheduleToExcel(ctxSched.engineCalc, getEstimateExportAddress())) {
                            alert('Нет этапов для экспорта');
                        }
                        return;
                    }
                    if (estimateSubView === EST_SUB_MATERIALS) {
                        var ctxMat = syncEstimateEngineContext();
                        if (!ctxMat) return;
                        if (!CmetShared.exportMaterialsLinksToExcel) {
                            alert('Экспорт ссылок недоступен');
                            return;
                        }
                        if (!CmetShared.exportMaterialsLinksToExcel(getEstimateExportAddress())) {
                            alert('Нет выбранных материалов для экспорта');
                        }
                        return;
                    }
                    if (!ensurePanelsContext()) return;
                    if (!CmetShared.exportEstimateToExcel) {
                        alert('Экспорт недоступен');
                        return;
                    }
                    var edForExport = (estimateContent && estimateContent.querySelector('tbody tr.work-item') && CmetShared.collectEstimateFromMirror && lastEstimateData)
                        ? CmetShared.collectEstimateFromMirror(estimateContent, lastEstimateData)
                        : lastEstimateData;
                    CmetShared.exportEstimateToExcel(edForExport);
                });
            }

            if (estBtnSchedule) {
                estBtnSchedule.addEventListener('click', onEstActionSecondaryClick);
            }

            function openLemanaBasketUrl(url) {
                if (!url) {
                    alert('Нет позиций для выбранных работ');
                    return;
                }
                window.open(url, '_blank', 'noopener,noreferrer');
            }

            if (estPanelClose) estPanelClose.addEventListener('click', closeEstPanel);
            if (estPanelOverlay) {
                estPanelOverlay.addEventListener('click', function (e) {
                    if (e.target === estPanelOverlay) closeEstPanel();
                });
            }

            toMaterialsBtn.addEventListener('click', goToMaterials);
            if (materialsDetailSelectBtn) materialsDetailSelectBtn.addEventListener('click', goToMaterials);
            toEstimateBtn.addEventListener('click', goToEstimate);
            if (pageStepper) {
                pageStepper.addEventListener('click', function (e) {
                    var btn = e.target.closest('.stepper__item[data-step]');
                    if (!btn || btn.disabled) return;
                    goToStep(parseInt(btn.getAttribute('data-step'), 10));
                });
            }
            initSwipeNavigation();
            initPhoneBackNavigation();
            updateStepper();

            qtyDialogCancel.addEventListener('click', closeQtyDialog);
            qtyDialogOk.addEventListener('click', confirmQtyDialog);
            qtyDialogInput.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') confirmQtyDialog();
            });
            qtyDialogThickInput.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') confirmQtyDialog();
            });
            qtyDialog.addEventListener('click', function (e) {
                if (e.target === qtyDialog) closeQtyDialog();
            });

            calcBtn.addEventListener('click', function () {
                var totalArea = parseFloat(document.getElementById('totalArea').value);
                var height = parseFloat(document.getElementById('ceilingHeight').value);
                var apartmentType = document.getElementById('apartmentType').value;
                var bathTotal = getTotalBathroomSqm();
                var livingArea = getLivingAreaWithoutBath(totalArea, bathTotal);
                var bathParams = getEngineBathroomParams();

                if (isNaN(totalArea) || totalArea <= 0) {
                    alert('Введите общую площадь квартиры больше 0');
                    return;
                }
                if (isNaN(bathTotal)) {
                    alert('Укажите площадь санузла / туалета' + (typeSel.value === 'separate' ? ' и ванной' : '') + ' больше 0');
                    return;
                }
                if (isNaN(livingArea)) {
                    alert('Общая площадь должна быть больше суммы площадей санузла');
                    return;
                }
                if (isNaN(height) || height <= 0) {
                    alert('Введите высоту потолков больше 0');
                    return;
                }

                lastCalc = calculateAll(totalArea, height, apartmentType, bathParams, livingArea);
                syncMatItemQtyFromCalc();
                renderResults(lastCalc);
                hasResults = true;
                toMaterialsBtn.hidden = false;
                showScreen(SCREEN_RESULTS);
            });

            function onApartmentTypeOrPlanFieldChange() {
                if (!hasResults) return;
                var calc = tryRecalculatePlan();
                if (!calc) return;
                lastCalc = calc;
                renderResults(lastCalc);
                syncMatItemQtyFromCalc();
            }

            typeSel.addEventListener('change', function () {
                syncBathroomFields();
                onApartmentTypeOrPlanFieldChange();
            });
            apartmentTypeSel.addEventListener('change', function () {
                applyDefaultsFromApartmentType();
                onApartmentTypeOrPlanFieldChange();
            });
            ['totalArea', 'ceilingHeight', 'bathroomPrimary', 'bathroomVannaya'].forEach(function (id) {
                var el = document.getElementById(id);
                if (!el) return;
                el.addEventListener('input', schedulePlanInputRefresh);
                el.addEventListener('change', schedulePlanInputRefresh);
            });
            syncBathroomFields();
            applyDefaultsFromApartmentType();
            renderCategoryHub();
        })();
    </script>
</body>
</html>
